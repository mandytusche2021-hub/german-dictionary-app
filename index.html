<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Private web app for German studies integrating vocabulary and grammar practice.">
    <title>Meine Deutsch C2 Reise</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SheetJS for Excel Parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'german-black': '#111111',
                        'german-red': '#DD0000',
                        'german-gold': '#FFCC00',
                        'surface-light': '#F8F9FA',
                        'surface-card': '#FFFFFF',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface-light text-german-black min-h-screen font-sans selection:bg-german-gold selection:text-german-black">

    <!-- Top decorative bar matching German flag -->
    <div class="h-2 w-full flex">
        <div class="h-full bg-german-black flex-1"></div>
        <div class="h-full bg-german-red flex-1"></div>
        <div class="h-full bg-german-gold flex-1"></div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-10">
        
        <!-- Header -->
        <header class="mb-12 text-center md:text-left flex flex-col md:flex-row items-center justify-between">
            <div>
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-2">
                    Deutsch Wortschatz
                </h1>
                <p class="text-gray-500 text-lg">Build your German vocabulary to C2 level.</p>
            </div>
            
            <div class="mt-6 md:mt-0 opacity-80 shadow-sm rounded overflow-hidden flex transform hover:scale-105 transition-transform duration-300">
                <div class="w-8 h-6 bg-german-black"></div>
                <div class="w-8 h-6 bg-german-red"></div>
                <div class="w-8 h-6 bg-german-gold"></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <!-- Left Column: Add Word Form -->
            <div class="lg:col-span-4">
                <div class="bg-surface-card rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 sticky top-10 slide-up-anim overflow-hidden relative group">
                    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-german-black via-german-red to-german-gold opacity-50 group-hover:opacity-100 transition-opacity"></div>
                    
                    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="size-6 text-german-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add New Word
                    </h2>
                    
                    <form id="wordForm" class="space-y-5">
                        <div class="input-group">
                            <label for="germanWord" class="block text-sm font-medium text-gray-700 mb-1">German Word</label>
                            <input type="text" id="germanWord" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-german-red focus:border-transparent transition-all bg-gray-50 focus:bg-white placeholder-gray-400"
                                placeholder="e.g. sprechen">
                        </div>

                        <div class="input-group">
                            <label for="vietnameseMeaning" class="block text-sm font-medium text-gray-700 mb-1">Vietnamese Meaning</label>
                            <input type="text" id="vietnameseMeaning" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-german-red focus:border-transparent transition-all bg-gray-50 focus:bg-white placeholder-gray-400"
                                placeholder="e.g. nói">
                        </div>

                        <div class="input-group">
                            <label for="grammarNotes" class="block text-sm font-medium text-gray-700 mb-1">Grammar Notes (Optional)</label>
                            <textarea id="grammarNotes" rows="2"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-german-red focus:border-transparent transition-all bg-gray-50 focus:bg-white placeholder-gray-400 resize-none"
                                placeholder="e.g. mit + Dativ, über + Akk"></textarea>
                        </div>

                        <div class="input-group">
                            <label for="exampleSentence" class="block text-sm font-medium text-gray-700 mb-1">Example Sentence (Optional)</label>
                            <textarea id="exampleSentence" rows="2"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-german-red focus:border-transparent transition-all bg-gray-50 focus:bg-white placeholder-gray-400 resize-none"
                                placeholder="e.g. Ich spreche oft mit ihm."></textarea>
                        </div>

                        <button type="submit"
                            class="w-full py-3.5 px-4 bg-german-black text-white hover:bg-gray-800 rounded-xl font-medium tracking-wide transition-all shadow-md hover:shadow-lg active:scale-95 flex justify-center items-center gap-2 mt-4">
                            <span>Speichern</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Study View Table -->
            <div class="lg:col-span-8">
                <div class="bg-surface-card rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 slide-up-anim delay-100">
                    
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                        <h2 class="text-2xl font-semibold flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="size-6 text-german-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                            Study View
                        </h2>

                        <!-- Search Box for filtering (optional enhancement) -->
                        <div class="relative w-full sm:w-64">
                            <input type="text" id="searchInput" 
                                class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-german-black transition-all"
                                placeholder="Search words...">
                            <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-2.5 size-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <div class="overflow-x-auto rounded-xl border border-gray-100">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-200">
                                    <th class="px-6 py-4 font-medium rounded-tl-xl w-1/4">German Word</th>
                                    <th class="px-6 py-4 font-medium border-l border-r border-gray-100 w-1/4">Vietnamese Meaning</th>
                                    <th class="px-6 py-4 font-medium border-r border-gray-100 w-1/4">Grammar Notes</th>
                                    <th class="px-6 py-4 font-medium w-1/4">Example Sentence</th>
                                    <th class="px-4 py-4 rounded-tr-xl"></th>
                                </tr>
                            </thead>
                            <tbody id="wordTableBody" class="divide-y divide-gray-100 text-gray-800">
                                <!-- JS will populate this -->
                                <tr id="emptyStateRow">
                                    <td colspan="5" class="px-6 py-12 text-center text-gray-400">
                                        <div class="flex flex-col items-center justify-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="size-12 mb-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                                            </svg>
                                            <p>No words added yet.</p>
                                            <p class="text-sm mt-1">Start adding words from the left panel!</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="mt-6 flex justify-between items-center text-sm text-gray-500">
                        <span id="wordCountLabel">0 words saved</span>
                        <div class="flex items-center gap-4">
                            <!-- Hidden input -->
                            <input type="file" id="importInput" class="hidden" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
                            
                            <button id="importBtn" class="hover:text-german-black transition-colors flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                </svg>
                                Import Excel/CSV
                            </button>

                            <button id="exportBtn" class="hover:text-german-black transition-colors flex items-center gap-1 hidden">
                                <svg xmlns="http://www.w3.org/2000/svg" class="size-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                                Export JSON
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
